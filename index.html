<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime World</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #020617;
    color: #e2e8f0;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding-bottom: 20px;
}

nav a {
    color: #94a3b8;
    text-decoration: none;
}

nav a:hover {
    color: #38bdf8;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: #020617;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 280px;
    object-fit: cover;
}

.card-content {
    padding: 10px;
}

.card h3 {
    margin: 0;
    font-size: 16px;
}

.card p {
    font-size: 13px;
    color: #94a3b8;
}

footer {
    text-align: center;
    padding: 20px;
    color: #64748b;
}
</style>
</head>

<body>

<header>ANIME WORLD</header>

<nav>
<a href="#">Anime</a>
<a href="#">Manga</a>
<a href="#">Yangiliklar</a>
<a href="#">Yaponiya</a>
</nav>

<div class="container">

<h2>🔥 Mashhur Animelar</h2>

<div class="grid" id="animeList"></div>

</div>

<footer>© 2026 Anime World</footer>

<script>
const animeData = [
{
    title: "Attack on Titan",
    image: "https://cdn.myanimelist.net/images/anime/10/47347.jpg",
    desc: "Insoniyat va titanlar o'rtasidagi urush"
},
{
    title: "Naruto",
    image: "https://cdn.myanimelist.net/images/anime/13/17405.jpg",
    desc: "Ninja hayoti va orzular"
},
{
    title: "One Piece",
    image: "https://cdn.myanimelist.net/images/anime/6/73245.jpg",
    desc: "Qaroqchilar va xazina izlash"
},
{
    title: "Demon Slayer",
    image: "https://cdn.myanimelist.net/images/anime/1286/99889.jpg",
    desc: "Demonlarga qarshi kurash"
},
{
    title: "Jujutsu Kaisen",
    image: "https://cdn.myanimelist.net/images/anime/1171/109222.jpg",
    desc: "Sehr va la'natlar dunyosi"
},
{
    title: "Tokyo Revengers",
    image: "https://cdn.myanimelist.net/images/anime/1839/122012.jpg",
    desc: "Vaqtga sayohat va jinoyat"
}
];

const container = document.getElementById("animeList");

animeData.forEach(anime => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="${anime.image}" alt="${anime.title}">
        <div class="card-content">
            <h3>${anime.title}</h3>
            <p>${anime.desc}</p>
        </div>
    `;

    container.appendChild(card);
});
</script>

</body>
</html>
